name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        arch: [amd64, arm64]
        include:
          - os: ubuntu-latest
            arch: arm64
            target: android
          - os: ubuntu-latest
            arch: arm64
            target: linux
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"

      - name: Build
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            export GOARCH=arm64
            if [ "${{ matrix.target }}" = "android" ]; then
              export GOOS=android
            elif [ "${{ matrix.target }}" = "linux" ]; then
              export GOOS=linux
            fi
          else
            export GOARCH=amd64
          fi
          go build -trimpath -ldflags="-s -w" -o pm ./cmd

      - name: Rename binary
        run: |
          if [ "${{ matrix.target }}" = "android" ]; then
            ARCH="${{ matrix.arch }}"
            mv pm pm-android-${ARCH}
          elif [ "${{ matrix.target }}" = "linux" ]; then
            ARCH="${{ matrix.arch }}"
            mv pm pm-linux-${ARCH}
          else
            OS=$(echo "${{ matrix.os }}" | sed 's/-latest//')
            if [ "$OS" = "ubuntu" ]; then
              OS="linux"
            fi
            ARCH="${{ matrix.arch }}"
            mv pm pm-${OS}-${ARCH}
          fi

      - name: List files
        run: ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pm-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            pm-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: |
          echo "Listing artifacts directory:"
          ls -la artifacts/
          echo "Listing all files:"
          find artifacts -type f

      - name: Create release
        id: create_release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          name: Release ${{ github.ref }}
          draft: false
          prerelease: false
          files: |
            artifacts/**/pm-*
