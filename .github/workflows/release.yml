name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Create release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false

  build:
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        arch: [amd64, arm64]
        include:
          - os: ubuntu-latest
            arch: arm64
            target: android
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"

      - name: Build on Windows
        if: matrix.os == 'windows-latest'
        run: |
          if ("${{ matrix.arch }}" -eq "arm64") {
            $env:GOARCH = "arm64"
          } else {
            $env:GOARCH = "amd64"
          }
          go build -trimpath -ldflags="-s -w" -o pm.exe ./cmd

      - name: Build on Unix-like systems
        if: matrix.os != 'windows-latest'
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            if [ "${{ matrix.target }}" = "android" ]; then
              export GOOS=android
            fi
            export GOARCH=arm64
          else
            export GOARCH=amd64
          fi
          make build

      - name: Rename binary for release on Windows
        if: matrix.os == 'windows-latest'
        run: |
          $OS = "windows"
          $ARCH = "${{ matrix.arch }}"
          Move-Item -Path pm.exe -Destination "pm-${OS}-${ARCH}.exe"

      - name: Rename binary for release on Unix-like systems
        if: matrix.os != 'windows-latest'
        run: |
          OS=$(echo "${{ matrix.os }}" | sed 's/-latest//')
          ARCH=${{ matrix.arch }}
          TARGET=${{ matrix.target }}
          if [ "$TARGET" = "android" ]; then
            mv pm pm-android-${ARCH}
          else
            mv pm pm-${OS}-${ARCH}
          fi

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ 
            matrix.os == 'windows-latest' 
              ? format('./pm-windows-{0}.exe', matrix.arch) 
              : matrix.target == 'android' 
                ? format('./pm-android-{0}', matrix.arch) 
                : format('./pm-{0}-{1}', replace(matrix.os, '-latest', ''), matrix.arch) 
          }}
          asset_name: ${{ 
            matrix.os == 'windows-latest' 
              ? format('pm-windows-{0}.exe', matrix.arch) 
              : matrix.target == 'android' 
                ? format('pm-android-{0}', matrix.arch) 
                : format('pm-{0}-{1}', replace(matrix.os, '-latest', ''), matrix.arch) 
          }}
          asset_content_type: application/octet-stream