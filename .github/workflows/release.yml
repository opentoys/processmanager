name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux builds
          - os: ubuntu-latest
            arch: amd64
            target: linux
          - os: ubuntu-latest
            arch: arm64
            target: linux
          # macOS builds
          - os: macos-latest
            arch: amd64
            target: macos
          - os: macos-latest
            arch: arm64
            target: macos
          # Windows builds
          - os: windows-latest
            arch: amd64
            target: windows
          - os: windows-latest
            arch: arm64
            target: windows
          # Android build
          - os: ubuntu-latest
            arch: arm64
            target: android
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"

      - name: Build on Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $env:GOARCH = "${{ matrix.arch }}"
          $env:GOOS = "windows"

          # Get git tag
          $gitTag = git describe --tags --abbrev=0 2>$null
          if (-not $gitTag) {
            $gitTag = "v0.0.0"
          }

          # Get current version (date and time)
          $version = Get-Date -Format "yyyy.MM.dd-HHmm"

          # Get Go version
          $goVersion = go version | Select-String -Pattern "go\d+\.\d+\.\d+" | ForEach-Object { $_.Matches.Value }

          # Build full version string
          $fullVersion = "$gitTag($version)"

          # Build ldflags
          $ldflags = "-s -w -X processmanager/internal/utils.Version=$fullVersion -X processmanager/internal/utils.GoVersion=$goVersion"

          go build -trimpath -ldflags="$ldflags" -o pm.exe ./cmd

      - name: Build on Unix-like systems
        if: matrix.os != 'windows-latest'
        run: |
          export GOARCH=${{ matrix.arch }}
          if [ "${{ matrix.target }}" = "android" ]; then
            export GOOS=android
          elif [ "${{ matrix.target }}" = "linux" ]; then
            export GOOS=linux
          elif [ "${{ matrix.target }}" = "macos" ]; then
            export GOOS=darwin
          fi
          make build

      - name: Rename binary on Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $TARGET = "${{ matrix.target }}"
          $ARCH = "${{ matrix.arch }}"
          Move-Item -Path pm.exe -Destination "pm-${TARGET}-${ARCH}.exe"

      - name: Rename binary on Unix-like systems
        if: matrix.os != 'windows-latest'
        run: |
          TARGET="${{ matrix.target }}"
          ARCH="${{ matrix.arch }}"
          mv pm pm-${TARGET}-${ARCH}

      - name: List files
        run: ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pm-${{ matrix.target }}-${{ matrix.arch }}
          path: |
            pm-*
            pm-*.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: |
          echo "Listing artifacts directory:"
          ls -la artifacts/
          echo "Listing all files:"
          find artifacts -type f

      - name: Create release
        id: create_release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            artifacts/**/pm-*
