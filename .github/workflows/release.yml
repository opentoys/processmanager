name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        arch: [amd64, arm64]
        include:
          - os: ubuntu-latest
            arch: arm64
            target: android
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"

      - name: Build
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            if [ "${{ matrix.arch }}" = "arm64" ]; then
              export GOARCH=arm64
            else
              export GOARCH=amd64
            fi
            go build -trimpath -ldflags="-s -w" -o pm.exe ./cmd
          else
            if [ "${{ matrix.arch }}" = "arm64" ]; then
              export GOARCH=arm64
              if [ "${{ matrix.target }}" = "android" ]; then
                export GOOS=android
              fi
            else
              export GOARCH=amd64
            fi
            go build -trimpath -ldflags="-s -w" -o pm ./cmd
          fi

      - name: Rename binary
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            OS="windows"
            ARCH="${{ matrix.arch }}"
            mv pm.exe pm-${OS}-${ARCH}.exe
          else
            if [ "${{ matrix.target }}" = "android" ]; then
              ARCH="${{ matrix.arch }}"
              mv pm pm-android-${ARCH}
            else
              OS=$(echo "${{ matrix.os }}" | sed 's/-latest//')
              ARCH="${{ matrix.arch }}"
              mv pm pm-${OS}-${ARCH}
            fi
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pm-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            pm-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false

      - name: Upload release assets
        run: |
          find artifacts -type f -name "pm-*" | while read -r file; do
            filename=$(basename "$file")
            echo "Uploading $file as $filename"
            curl -X POST "${{ steps.create_release.outputs.upload_url }}" \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Content-Type: application/octet-stream" \
              -F "name=$filename" \
              -F "file=@$file"
          done
