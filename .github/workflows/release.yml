name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux builds
          - os: ubuntu-latest
            arch: amd64
            target: linux
          - os: ubuntu-latest
            arch: arm64
            target: linux
          # macOS builds
          - os: macos-latest
            arch: amd64
            target: macos
          - os: macos-latest
            arch: arm64
            target: macos
          # Android build
          - os: ubuntu-latest
            arch: arm64
            target: android
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"

      - name: Build
        run: |
          export GOARCH=${{ matrix.arch }}
          if [ "${{ matrix.target }}" = "android" ]; then
            export GOOS=android
          elif [ "${{ matrix.target }}" = "linux" ]; then
            export GOOS=linux
          elif [ "${{ matrix.target }}" = "macos" ]; then
            export GOOS=darwin
          fi
          go build -trimpath -ldflags="-s -w" -o pm ./cmd

      - name: Rename binary
        run: |
          TARGET="${{ matrix.target }}"
          ARCH="${{ matrix.arch }}"
          mv pm pm-${TARGET}-${ARCH}

      - name: List files
        run: ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pm-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            pm-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: |
          echo "Listing artifacts directory:"
          ls -la artifacts/
          echo "Listing all files:"
          find artifacts -type f

      - name: Create release
        id: create_release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            artifacts/**/pm-*
